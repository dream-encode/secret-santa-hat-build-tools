name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for npm OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # No dependencies and no build step: publish directly. Provenance is
      # generated automatically via OIDC trusted publishing.
      - run: npm publish
